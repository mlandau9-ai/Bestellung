<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kugel Bestellung">
<meta name="theme-color" content="#3b2417">
<title>Kugel · Bestellung</title>
<style>
  :root{
    --espresso:#3b2417; --brown:#8B5E3C; --gold:#C9A227; --gold-dk:#a9871c;
    --cream:#f6f0e6; --card:#fffdf8; --ink:#2a1c12; --muted:#8a7860;
    --line:#e7dcc9; --good:#2f7d4f; --good-bg:#e7f3ec;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream); color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* Header */
  header{
    position:sticky; top:0; z-index:20;
    background:var(--espresso); color:#f4ead9;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .brand{display:flex; align-items:baseline; gap:8px; margin-bottom:10px}
  .brand b{font-size:19px; letter-spacing:.3px}
  .brand span{font-size:12px; color:#c9b79c}
  .seg{display:flex; background:rgba(255,255,255,.08); border-radius:12px; padding:3px; gap:3px}
  .seg button{
    flex:1; border:0; background:transparent; color:#e9dcc6;
    font-size:14px; font-weight:600; padding:9px 6px; border-radius:9px;
  }
  .seg button.on{background:var(--gold); color:#2a1c12}
  .tabs{display:flex; gap:22px; margin-top:12px}
  .tabs button{
    border:0; background:transparent; color:#c3ad8d; font-size:15px;
    font-weight:600; padding:10px 0 12px; position:relative;
  }
  .tabs button.on{color:#fff}
  .tabs button.on::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:var(--gold); border-radius:3px 3px 0 0;
  }
  .sub{font-size:12px; color:#b7a punt; }
  /* Content */
  main{padding:14px 12px 120px; max-width:640px; margin:0 auto}
  .cathead{
    display:flex; align-items:center; gap:8px;
    margin:18px 4px 8px; font-size:12px; font-weight:700;
    letter-spacing:.8px; text-transform:uppercase; color:var(--brown);
  }
  .cathead::after{content:""; flex:1; height:1px; background:var(--line)}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 12px 12px 14px; margin-bottom:9px;
    display:grid; grid-template-columns:1fr auto; gap:6px 10px; align-items:center;
  }
  .card.need{border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,162,39,.16)}
  .nm{font-size:15px; font-weight:600; line-height:1.25}
  .meta{font-size:12px; color:var(--muted); margin-top:3px}
  .meta .pr{color:var(--brown); font-weight:600}
  .stepper{display:flex; align-items:center; gap:0; justify-self:end}
  .stepper button{
    width:40px; height:40px; border:1px solid var(--line); background:#fff;
    font-size:22px; font-weight:600; color:var(--brown); border-radius:11px;
  }
  .stepper button:active{background:var(--cream)}
  .stepper input{
    width:46px; height:40px; text-align:center; border:0; background:transparent;
    font-size:18px; font-weight:700; color:var(--ink); margin:0 2px;
    -moz-appearance:textfield;
  }
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none}
  .order-badge{
    grid-column:1 / -1; justify-self:start; margin-top:2px;
    font-size:12.5px; font-weight:700; color:var(--good);
    background:var(--good-bg); padding:3px 9px; border-radius:20px;
  }
  .soll-edit{
    grid-column:1 / -1; display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--muted); margin-top:2px;
  }
  .soll-edit input{
    width:44px; height:26px; text-align:center; border:1px solid var(--line);
    border-radius:7px; font-size:13px; font-weight:600; color:var(--brown); background:#fff;
  }
  /* Bestellung view */
  .order-wrap{padding-top:4px}
  .order-empty{text-align:center; color:var(--muted); padding:60px 20px}
  .order-empty b{display:block; color:var(--ink); font-size:16px; margin-bottom:6px}
  .oline{
    display:flex; justify-content:space-between; align-items:baseline;
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:11px 13px; margin-bottom:8px;
  }
  .oline .q{font-weight:800; color:var(--brown); font-size:16px; min-width:52px}
  .oline .t{flex:1; font-size:14.5px; font-weight:600}
  .oline .g{font-size:12px; color:var(--muted)}
  .oline .s{font-size:13px; color:var(--muted); font-weight:600}
  .total{
    display:flex; justify-content:space-between; align-items:center;
    margin:14px 2px 2px; font-size:15px;
  }
  .total b{font-size:20px; color:var(--espresso)}
  .actions{position:fixed; left:0; right:0; bottom:0; z-index:15;
    padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);
    background:linear-gradient(to top,var(--cream) 72%,transparent);
    display:flex; gap:10px; max-width:640px; margin:0 auto;}
  .btn{flex:1; border:0; border-radius:13px; padding:15px; font-size:15px; font-weight:700}
  .btn.primary{background:var(--gold); color:#2a1c12}
  .btn.primary:active{background:var(--gold-dk)}
  .btn.ghost{background:#fff; color:var(--brown); border:1px solid var(--line); flex:0 0 auto; padding:15px 18px}
  .toast{
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
    background:var(--espresso); color:#fff; padding:11px 18px; border-radius:24px;
    font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:.25s; z-index:30;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .foot{text-align:center; color:var(--muted); font-size:11px; margin-top:24px; padding:0 20px}
  .foot a{color:var(--brown)}
</style>
</head>
<body>
<header>
  <div class="brand"><b>Kugel · Bestellung</b><span id="subline"></span></div>
  <div class="seg" id="filialeSeg"></div>
  <div class="tabs" id="tabSeg">
    <button data-tab="count" class="on">Zählen</button>
    <button data-tab="order">Bestellung</button>
  </div>
</header>
<main id="main"></main>
<div class="actions" id="actions" style="display:none"></div>
<div class="toast" id="toast"></div>

nziert", "geb": "KT (1000St)", "soll": 1, "preis": 68.5, "stand": "22.06", "cat": "occ"}, {"art": "0038633", "bez": "ProHaag Hand Wash 5L", "geb": "KA", "soll": 1, "preis": 11.9, "stand": "06.07", "cat": "occ"}, {"art": "0031125", "bez": "Servietten weiss 1/4F. 33x33 (500)", "geb": "PG (500St)", "soll": 10, "preis": 4.79, "stand": "29.06", "cat": "occ"}, {"art": "0009880", "bez": "Sprüh-Magermilchpulver 1% VH", "geb": "SA (25kg)", "soll": 2, "preis": 97.0, "stand": "24.06", "cat": "occ"}, {"art": "0002242", "bez": "TK-CA Bio-Zitronensaft (EI)", "geb": "EI (10kg)", "soll": 2, "preis": 44.1, "stand": "24.06", "cat": "occ"}, {"art": "0002733", "bez": "TK-Erdbeeren Ägypten 10kg", "geb": "KT (10kg)", "soll": 6, "preis": 25.4, "stand": "29.06", "cat": "occ"}, {"art": "0034540", "bez": "Toilettenpap. 3-Lg. (8 Rollen)", "geb": "PG", "soll": 8, "preis": 4.2, "stand": "22.06", "cat": "occ"}, {"art": "0002750", "bez": "weiße Schokoraspel (Parmesan)", "geb": "KT (5kg)", "soll": 1, "preis": 50.2, "stand": "22.06", "cat": "occ"}, {"art": "0005306", "bez": "Weißzucker EU (NZ)", "geb": "SA (25kg)", "soll": 8, "preis": 18.5, "stand": "24.06", "cat": "occ"}]}};
const state = { filiale:"prod", tab:"count" };
const KEY = f => "kugel_"+f;

function load(f){
  try{ const raw=localStorage.getItem(KEY(f)); return raw?JSON.parse(raw):{}; }
  catch(e){ return {}; }
}
function save(f,obj){ try{ localStorage.setItem(KEY(f),JSON.stringify(obj)); }catch(e){} }
function store(){ return load(state.filiale); }
function setItem(art,patch){
  const s=store(); s[art]=Object.assign({},s[art],patch); save(state.filiale,s);
}
function getSoll(it,s){ return (s[it.art]&&s[it.art].soll!=null)?s[it.art].soll:it.soll; }
function getIst(it,s){ return (s[it.art]&&s[it.art].ist!=null)?s[it.art].ist:0; }
function orderQty(it,s){ return Math.max(0, getSoll(it,s)-getIst(it,s)); }

function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),1600);
}

function renderFiliale(){
  const seg=document.getElementById("filialeSeg"); seg.innerHTML="";
  Object.keys(DATA).forEach(f=>{
    const b=document.createElement("button");
    b.textContent=DATA[f].name; if(f===state.filiale)b.className="on";
    b.onclick=()=>{ state.filiale=f; render(); };
    seg.appendChild(b);
  });
  document.getElementById("subline").textContent=DATA[state.filiale].sub;
}
function renderTabs(){
  document.querySelectorAll("#tabSeg button").forEach(b=>{
    b.classList.toggle("on", b.dataset.tab===state.tab);
    b.onclick=()=>{ state.tab=b.dataset.tab; render(); };
  });
}

function card(it){
  const s=store(); const ist=getIst(it,s); const soll=getSoll(it,s); const oq=orderQty(it,s);
  const el=document.createElement("div"); el.className="card"+(oq>0?" need":"");
  el.innerHTML=`
    <div>
      <div class="nm">${it.bez}</div>
      <div class="meta">${it.geb} · <span class="pr">${it.preis.toFixed(2).replace('.',',')} €</span>/Geb.</div>
    </div>
    <div class="stepper">
      <button aria-label="weniger">−</button>
      <input type="number" inputmode="numeric" value="${ist}" min="0">
      <button aria-label="mehr">+</button>
    </div>
    <div class="soll-edit">Soll <input type="number" inputmode="numeric" value="${soll}" min="0"> ${it.geb.split(' ')[0]}</div>
    ${oq>0?`<div class="order-badge">→ ${oq} bestellen</div>`:``}
  `;
  const [minus,plus]=el.querySelectorAll(".stepper button");
  const inp=el.querySelector(".stepper input");
  const sollInp=el.querySelector(".soll-edit input");
  const commit=()=>{ setItem(it.art,{ist:Math.max(0,parseInt(inp.value||0))}); refreshCard(el,it); };
  minus.onclick=()=>{ inp.value=Math.max(0,(parseInt(inp.value||0))-1); commit(); };
  plus.onclick=()=>{ inp.value=(parseInt(inp.value||0))+1; commit(); };
  inp.onchange=commit;
  sollInp.onchange=()=>{ setItem(it.art,{soll:Math.max(0,parseInt(sollInp.value||0))}); refreshCard(el,it); };
  return el;
}
function refreshCard(el,it){
  const s=store(); const oq=orderQty(it,s);
  el.classList.toggle("need",oq>0);
  let badge=el.querySelector(".order-badge");
  if(oq>0){
    if(!badge){ badge=document.createElement("div"); badge.className="order-badge"; el.appendChild(badge); }
    badge.textContent=`→ ${oq} bestellen`;
  } else if(badge){ badge.remove(); }
}

function renderCount(){
  const main=document.getElementById("main"); main.innerHTML="";
  const items=DATA[state.filiale].items;
  [["reg","Regelmäßig"],["occ","Gelegentlich / bei Bedarf"]].forEach(([cat,label])=>{
    const group=items.filter(i=>i.cat===cat);
    if(!group.length) return;
    const h=document.createElement("div"); h.className="cathead"; h.textContent=label;
    main.appendChild(h);
    group.forEach(it=>main.appendChild(card(it)));
  });
  document.getElementById("actions").style.display="none";
}

function orderLines(){
  const s=store();
  return DATA[state.filiale].items
    .map(it=>({it,q:orderQty(it,s)}))
    .filter(x=>x.q>0)
    .sort((a,b)=>a.it.bez.localeCompare(b.it.bez));
}
function renderOrder(){
  const main=document.getElementById("main"); main.innerHTML="";
  const wrap=document.createElement("div"); wrap.className="order-wrap"; main.appendChild(wrap);
  const lines=orderLines();
  if(!lines.length){
    wrap.innerHTML=`<div class="order-empty"><b>Noch nichts zu bestellen</b>Zähl im Reiter „Zählen“ die Bestände. Alles, wo der Ist-Bestand unter dem Soll liegt, erscheint hier.</div>`;
    document.getElementById("actions").style.display="none";
    return;
  }
  let sum=0;
  lines.forEach(({it,q})=>{
    sum+=q*it.preis;
    const l=document.createElement("div"); l.className="oline";
    l.innerHTML=`<div class="q">${q}×</div>
      <div class="t">${it.bez}<div class="g">${it.geb}</div></div>
      <div class="s">${(q*it.preis).toFixed(2).replace('.',',')} €</div>`;
    wrap.appendChild(l);
  });
  const t=document.createElement("div"); t.className="total";
  t.innerHTML=`<span>Geschätzter Warenwert (netto)</span><b>${sum.toFixed(2).replace('.',',')} €</b>`;
  wrap.appendChild(t);

  const act=document.getElementById("actions"); act.style.display="flex"; act.innerHTML="";
  const copy=document.createElement("button"); copy.className="btn primary"; copy.textContent="Bestellung kopieren";
  copy.onclick=()=>{ const txt=orderText(); navigator.clipboard.writeText(txt).then(()=>toast("Bestellung kopiert")).catch(()=>toast("Kopieren nicht möglich")); };
  const mail=document.createElement("button"); mail.className="btn ghost"; mail.textContent="✉︎";
  mail.onclick=()=>{ const d=DATA[state.filiale]; location.href="mailto:info@hefe-van-haag.de?subject="+encodeURIComponent("Bestellung Kugel UG – "+d.name)+"&body="+encodeURIComponent(orderText()); };
  act.appendChild(copy); act.appendChild(mail);
}
function orderText(){
  const d=DATA[state.filiale]; const lines=orderLines();
  const today=new Date().toLocaleDateString("de-DE");
  let out=`Bestellung – Kugel UG / ${d.name}
${d.sub}
Datum: ${today}

`;
  lines.forEach(({it,q})=>{ out+=`${q}x  ${it.bez}  (${it.geb})
`; });
  return out;
}

function render(){ renderFiliale(); renderTabs(); state.tab==="count"?renderCount():renderOrder(); }
render();
</script>
